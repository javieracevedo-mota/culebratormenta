<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivo Interceptado</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ff66;
  font-family: monospace;
  overflow: hidden;
}
#terminal {
  box-sizing: border-box;
  width: 100%;
  height: 100vh;
  padding: 24px;
  white-space: pre-wrap;
  overflow-y: auto;
  font-size: 24px;
  line-height: 1.45;
}
.cursor {
  animation: blink 1s infinite;
}
@keyframes blink {
  50% {
    opacity: 0;
  }
}
</style>
</head>
<body>
<div id="terminal"></div>
<script>
const texto = `
'╔═════════════════════════════════════════════════════════╗',
' ARCHIVO INTERCEPTADO',
' registro: 07',
' asunto: culebra tormenta',
' fecha estimada: 22 de junio, 2033',
' ubicación aproximada: '20° 07´43.46´´N / 99°17´38.04´´O',
'estado de señal: inestable',
'╚═════════════════════════════════════════════════════════╝'
];

[INICIO DEL MENSAJE]

He llegado demasiado lejos.
Más lejos
de lo que quería llegar.

Desarrollé un dispositivo que sintetiza 
la tecnología del garambullo.
Con algunos chinicuiles 
que robé del cuartel de Gusano Rojo.

No sabía que sus capullos 
producirían filamentos tan extraños.
Los alimenté 
con 
raíces de garambullo.
Su seda comenzó a tejerse 
con arena de un hormiguero.
Formaron una estructura que latía.
Casi como si estuviera 
vi
va.

Los circuitos electrónicos respondieron.
El dispositivo se activó.

Puedo abrir momentos intertemporales.
Pero son frágiles.
Borrosos.
Inestables. 


Y ahora estoy aquí.

En un futuro que ojalá nunca veas.
El Valle del Mezquital ya no 
es el mismo.
La guerra del 
agua 
ocurrió.

Mejor dicho,
Estaba ocurriendo
cuando llegué.


Me costó entenderlo al principio.
No quedaba un solo rastro 
de agua para tomar.

Las cisternas vacías.
Los pozos secos.

Lo único que circulaba
era agua residual.
Esa agua podía cubrir a pueblos enteros
ahora es lo único que queda para beber.

El agua se intercambia en los mismos bidones
que antes se usaban para 
el huachicol.
Se trafica en botellas 
con etiquetas falsas.

Se roba.
Se mata.
Se muere
por ella.

Llegué en medio de una balacera.


Unos sicarios interceptaron 
una camioneta.
Después le prendieron fuego.
La estaban esperando. 

Mientras observaba cómo las llamas
la cubrían debajo 
de un sol infernal
recordé el parecido que 
tenía con tu camioneta.

Una armada con piezas de distintos vehículos.
La frankenstein, le llamábamos
Seguí las huellas de las llantas.

Me llevaron a una bodega escondida 
en una falla del Cerro del Xicuco.
Esperé horas antes de entrar, 
cuando estuve seguro de que 
nadie vigilaba entré.

Era un laboratorio.

Intentaban clonar 
reptiles y anfibios.
Había vitrinas con extremidades 
secas conservadas en formol.
Figuras de barro representando 
criaturas que 
parecían antiguas
y nuevas 
al mismo tiempo.



En las mesas 
había esculturas quemadas 
eran reconstruidas.
Como si intentaran armar 
algo perdido.
El laboratorio 
contenía un herpetario.
Los estantes y terrarios 
parecían altares.
Cubiertos de espinas. 


En la mesa había una grabadora.
La encendí 
y escuché  a una científica 
registraba su investigación.
Hablaba de una 
culebra sagrada.

Intentaban clonarla
Habían encontrado una imagen 
de una profecía.
Decía que en medio de la 
guerra del agua
tres animales
sagrados
podrían traer
el diluvio
de vuelta.

Una lagartija cuyas lágrimas 
harían brotar plantas del suelo.
Una rana capaz de tocar las rocas 
y convertirlas
en agua.
Y una serpiente con ojos de rayo, 
capaz de traer 
treinta días de tormenta al Valle.
Treinta días 
de lluvias.
Treinta días
de descargas eléctricas.
Suficiente energía
para abrir un portal estable.



Y regresar
contigo.



Si todo lo que dijeron es cierto
esto no es el final.
El Valle aún puede renacer.
El agua aún puede volver.

Debo encontrar a estos animales.



Tal vez 
este mensaje 
sea 
el 
último 
por mucho 
tiempo.


[FIN DEL MENSAJE]
..
...
....
......
estado de señal: degradado
registro archivado
.
.
.
.
`;
const terminal = document.querySelector('#terminal');
let indice = 0;
let salida = '';
let interferenciaMostrada = false;
const TIEMPO_REINICIO = 300000;
const corrupciones = {
  o: '0',
  O: '0',
  a: '4',
  A: '4',
  e: '3',
  E: '3',
  i: '1',
  I: '1'
};
function corromper(letra) {
  if (
    corrupciones[letra] &&
    Math.random() < 0.04
  ) {
    return corrupciones[letra];
  }
  return letra;
}
function reiniciarSistema() {
  terminal.innerHTML = '';
  setTimeout(function() {
    indice = 0;
    salida = '';
    interferenciaMostrada = false;
    escribir();
  }, 5000);
}
function escribir() {
  if (indice >= texto.length) {
    terminal.innerHTML = salida;
    setTimeout(function() {
      reiniciarSistema();
    }, TIEMPO_REINICIO);
    return;
  }
  if (
    !interferenciaMostrada &&
    indice > texto.length * 0.75
  ) {
    interferenciaMostrada = true;
    terminal.innerHTML =
      salida +
      '\n\n[ SEÑAL INESTABLE ]\n';
    terminal.scrollTop =
      terminal.scrollHeight;
    setTimeout(function() {
      terminal.innerHTML =
        salida +
        '\n\n[ RECONECTANDO ]\n';
      terminal.scrollTop =
        terminal.scrollHeight;
      setTimeout(escribir, 2500);
    }, 1500);
    return;
  }
  salida += corromper(texto[indice]);
  terminal.innerHTML =
    salida +
    '<span class="cursor">█</span>';
  terminal.scrollTop =
    terminal.scrollHeight;
  indice++;
  let velocidad = 80;
  if (Math.random() < 0.015) {
    velocidad = 80;
  }
  setTimeout(escribir, velocidad);
}
escribir();
</script>
</body>
</html>
